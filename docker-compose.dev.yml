version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: gamehub_db_dev
    environment:
      POSTGRES_USER: gamehub
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: gamehub_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamehub -d gamehub_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
