name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 144.91.65.250
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/gamehub
            git pull origin main
            docker compose up -d --build app
            docker image prune -f
